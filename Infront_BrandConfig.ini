; =============================================================================
; Infront Toolkit – Brand Compliance Configuration
; =============================================================================
; Diese Datei im selben Ordner wie die Infront Toolkit .ppam ablegen.
; Pfad: <Add-in-Ordner>/Infront_BrandConfig.ini
;
; Format:
;   [Abschnitt]
;   Schlüssel=Wert
;
; Kommentare beginnen mit ; oder #
; Leerzeilen werden ignoriert.
;
; PROFILE-SYSTEM:
;   Mehrere Profile möglich: [Profile.ProfileName]
;   Aktives Profil wird unter [General] gesetzt.
;   Profile-Namen dürfen keine Sonderzeichen enthalten.
; =============================================================================

[General]
; Name des aktiven Prüfprofils (muss einem [Profile.X]-Abschnitt entsprechen)
ActiveProfile=Default


; =============================================================================
; PROFIL: Default
; =============================================================================
[Profile.Default]

; Anzeigename des Profils
Name=Default

; --- Erlaubte Schriftarten ---------------------------------------------------
; Kommagetrennte Liste erlaubter Schriftnamen (Groß-/Kleinschreibung egal)
; Beispiel: Calibri,Calibri Light,Arial,Helvetica Neue
AllowedFonts=Calibri,Calibri Light,Arial

; --- Erlaubte Markenfarben ---------------------------------------------------
; Kommagetrennte Liste als Hex-Werte (#RRGGBB) oder RGB (R,G,B in Klammern)
; Beispiel: #003366,#C8102E,#FFFFFF,#000000
AllowedColors=#003366,#FF0000,#FFFFFF,#000000,#CCCCCC

; --- Farb-Toleranz -----------------------------------------------------------
; Maximale Abweichung pro Farbkanal (0 = exakt, 30 = großzügig)
; Wert 0–30
ColorTolerance=10

; --- Mindest-Schriftgröße ---------------------------------------------------
; Kleinste erlaubte Schriftgröße in Punkten (0 = keine Prüfung)
MinFontSizePt=8


; =============================================================================
; PROFIL: Strict (Beispiel – strenge Prüfung)
; =============================================================================
[Profile.Strict]
Name=Strict (streng)
AllowedFonts=Calibri,Calibri Light
AllowedColors=#003366,#FFFFFF,#000000
ColorTolerance=5
MinFontSizePt=10


; =============================================================================
; HINWEISE ZUR EINRICHTUNG
; =============================================================================
; 1. AllowedFonts:
;    - Exakter Schriftname wie in PowerPoint angezeigt
;    - Groß-/Kleinschreibung wird beim Vergleich ignoriert
;    - Leerzeichen vor/nach Komma werden ignoriert
;
; 2. AllowedColors:
;    - Format: #RRGGBB (Hex, ohne Leerzeichen)
;    - Groß-/Kleinschreibung egal: #003366 = #003366
;
; 3. ColorTolerance:
;    - 0 = exakt (nur exakt übereinstimmende Farben sind erlaubt)
;    - 10 = toleriert kleine Abweichungen (Rendering-Differenzen)
;    - 30 = großzügig (ähnliche Farben werden akzeptiert)
;    - Wird als maximale Abweichung je Farbkanal (R, G, B) interpretiert
;
; 4. MinFontSizePt:
;    - 0 deaktiviert die Größenprüfung
;    - Empfehlung: 8 pt (Barrierefreiheit)
;
; 5. Mehrere Profile:
;    - Beliebig viele [Profile.Name]-Abschnitte möglich
;    - Aktives Profil in [General] ActiveProfile setzen
; =============================================================================
